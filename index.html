<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube Player</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #fff;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    .player-wrap.inverted {
      filter: invert(1);
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .message {
      margin-top: 16px;
      line-height: 1.7;
      color: #ddd;
      word-break: break-all;
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .bookmarklet-section {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid #333;
    }

    .bookmarklet-section h2 {
      margin: 0 0 12px;
      font-size: 18px;
    }

    .bookmarklet-section p {
      margin: 0 0 16px;
      color: #ddd;
      line-height: 1.7;
    }

    .bookmarklet-code {
      display: block;
      box-sizing: border-box;
      width: 100%;
      min-height: 96px;
      margin-top: 16px;
      padding: 12px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #222;
      color: #fff;
      font: 13px/1.6 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", Menlo, monospace;
      resize: vertical;
      word-break: break-all;
    }

    .bookmarklet-copy-row {
      margin-top: 12px;
    }

    button,
    .bookmarklet-button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #fff;
      color: #111;
      font-weight: 700;
    }

    .bookmarklet-button {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
    }

    code {
      background: #222;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>
    <div class="player-wrap" id="playerWrap">
      <div id="player"></div>
    </div>

    <div class="controls">
      <button type="button" id="muteToggle">Mute</button>
      <button type="button" id="speed2Toggle">x2.0</button>
      <button type="button" id="skipForward90">&gt;&gt;90</button>
      <button type="button" id="skipBack10">&lt;&lt;10</button>
      <button type="button" id="skipForward10">&gt;&gt;10</button>
      <button type="button" id="invertToggle">Invert</button>
    </div>

    <div class="message" id="message"></div>

    <section class="bookmarklet-section" aria-labelledby="bookmarkletTitle">
      <h2 id="bookmarkletTitle">ブックマークレット</h2>
      <p>下のボタンをブックマークバーへドラッグして追加してください。YouTubeの動画ページで使うと、このプレイヤーで開きます。</p>
      <a
        class="bookmarklet-button"
        href='javascript:(()=>{const id=new URL(location.href).searchParams.get("v");if(!id){document.title="動画IDが見つかりません";return;}location.href="https://xnvplkd.github.io/z/?v="+encodeURIComponent(id);})();'
      >このプレイヤーで開く</a>
      <textarea class="bookmarklet-code" id="bookmarkletCode" readonly>javascript:(()=>{const id=new URL(location.href).searchParams.get("v");if(!id){document.title="動画IDが見つかりません";return;}location.href="https://xnvplkd.github.io/z/?v="+encodeURIComponent(id);})();</textarea>
      <div class="bookmarklet-copy-row">
        <button type="button" id="copyBookmarklet">コピー</button>
      </div>
    </section>
  </main>

  <script>
    const NORMAL_RATE = 1;
    const SPEED_2 = 2;
    const SKIP_10_SECONDS = 10;
    const SKIP_90_SECONDS = 90;
    const YOUTUBE_NOCOOKIE_HOST = "https://www.youtube-nocookie.com";
    const BOOKMARKLET_CODE = 'javascript:(()=>{const id=new URL(location.href).searchParams.get("v");if(!id){document.title="動画IDが見つかりません";return;}location.href="https://xnvplkd.github.io/z/?v="+encodeURIComponent(id);})();';

    let player = null;
    let currentRate = NORMAL_RATE;
    let isMuted = true;
    let isInverted = false;

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function extractYouTubeVideoId(input) {
      if (!input) return null;

      const value = input.trim();

      // 動画IDだけ渡された場合にも対応
      if (/^[a-zA-Z0-9_-]{11}$/.test(value)) {
        return value;
      }

      try {
        const url = new URL(value);
        const host = url.hostname.replace(/^www\./, "");

        // https://www.youtube.com/watch?v=VIDEO_ID
        const v = url.searchParams.get("v");
        if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) {
          return v;
        }

        // https://youtu.be/VIDEO_ID
        if (host === "youtu.be") {
          const id = url.pathname.split("/").filter(Boolean)[0];
          if (id && /^[a-zA-Z0-9_-]{11}$/.test(id)) {
            return id;
          }
        }

        // https://www.youtube.com/embed/VIDEO_ID
        // https://www.youtube-nocookie.com/embed/VIDEO_ID
        // https://www.youtube.com/shorts/VIDEO_ID
        // https://www.youtube.com/live/VIDEO_ID
        const parts = url.pathname.split("/").filter(Boolean);
        const markers = ["embed", "shorts", "live"];

        for (const marker of markers) {
          const index = parts.indexOf(marker);
          const id = parts[index + 1];

          if (index !== -1 && id && /^[a-zA-Z0-9_-]{11}$/.test(id)) {
            return id;
          }
        }
      } catch (error) {
        return null;
      }

      return null;
    }

    function setMessage(text) {
      document.getElementById("message").innerHTML = text;
    }

    function isPlayerReady() {
      return player && typeof player.getCurrentTime === "function";
    }

    function updateMuteButton() {
      const button = document.getElementById("muteToggle");
      button.textContent = isMuted ? "Unmute" : "Mute";
    }

    function updateSpeedButton() {
      const speed2Button = document.getElementById("speed2Toggle");
      speed2Button.textContent = currentRate === SPEED_2 ? "x1.0" : "x2.0";
    }

    function updateInvertButton() {
      const button = document.getElementById("invertToggle");
      button.textContent = isInverted ? "Normal" : "Invert";
    }

    function setMuted(muted) {
      if (!player) return;

      if (muted) {
        if (typeof player.mute === "function") {
          player.mute();
        }
      } else {
        if (typeof player.unMute === "function") {
          player.unMute();
        }
      }

      isMuted = muted;
      updateMuteButton();
      setMessage(isMuted ? "ミュートにしました" : "ミュートを解除しました");
    }

    function toggleMute() {
      if (!player) return;
      setMuted(!isMuted);
    }

    function setPlaybackRate(rate) {
      if (!player || typeof player.setPlaybackRate !== "function") return;

      const availableRates = player.getAvailablePlaybackRates
        ? player.getAvailablePlaybackRates()
        : [];

      if (availableRates.length > 0 && !availableRates.includes(rate)) {
        setMessage("この動画では指定した再生速度が利用できない可能性があります");
        return;
      }

      player.setPlaybackRate(rate);
      currentRate = rate;
      updateSpeedButton();

      setMessage("再生速度を <code>" + rate + "倍</code> に設定しました");
    }

    function toggleSpeed2() {
      if (!isPlayerReady()) return;

      player.playVideo();

      if (currentRate === SPEED_2) {
        setPlaybackRate(NORMAL_RATE);
        return;
      }

      setPlaybackRate(SPEED_2);
    }

    function seekBy(seconds) {
      if (!isPlayerReady()) return;

      const currentTime = player.getCurrentTime();
      const duration = player.getDuration ? player.getDuration() : 0;

      let nextTime = currentTime + seconds;

      if (nextTime < 0) {
        nextTime = 0;
      }

      if (duration && nextTime > duration) {
        nextTime = duration;
      }

      player.seekTo(nextTime, true);
    }

    function toggleInvert() {
      const playerWrap = document.getElementById("playerWrap");

      isInverted = !isInverted;
      playerWrap.classList.toggle("inverted", isInverted);
      updateInvertButton();

      setMessage(isInverted ? "色反転を有効にしました" : "色反転を解除しました");
    }

    function copyBookmarklet() {
      const code = document.getElementById("bookmarkletCode");
      const button = document.getElementById("copyBookmarklet");

      function showCopied() {
        button.textContent = "コピー済み";
        setTimeout(function () {
          button.textContent = "コピー";
        }, 1600);
      }

      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(BOOKMARKLET_CODE).then(showCopied).catch(function () {
          code.select();
          document.execCommand("copy");
          showCopied();
        });
        return;
      }

      code.select();
      document.execCommand("copy");
      showCopied();
    }

    function onYouTubeIframeAPIReady() {
      const rawUrl = getParam("url");
      const rawId = getParam("v");
      const videoId = extractYouTubeVideoId(rawUrl || rawId);

      if (!videoId) {
        setMessage(
          "URLパラメータにYouTube動画URLを指定してください<br>" +
          "例: <code>?v=LyH4MHShH2k</code><br>" +
          "または <code>?url=https%3A%2F%2Fwww.youtube-nocookie.com%2Fembed%2FLyH4MHShH2k</code>"
        );
        return;
      }

      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: videoId,
        host: YOUTUBE_NOCOOKIE_HOST,
        playerVars: {
          playsinline: 1,
          rel: 0
        },
        events: {
          onReady: function () {
            setMuted(true);
            setPlaybackRate(NORMAL_RATE);
            updateMuteButton();
            updateSpeedButton();
            updateInvertButton();
            setMessage("プレイヤーの準備ができました");
          },
          onPlaybackRateChange: function (event) {
            currentRate = event.data;
            updateSpeedButton();
          }
        }
      });
    }

    document.getElementById("muteToggle").addEventListener("click", toggleMute);

    document.getElementById("speed2Toggle").addEventListener("click", toggleSpeed2);

    document.getElementById("skipForward90").addEventListener("click", function () {
      seekBy(SKIP_90_SECONDS);
    });

    document.getElementById("skipBack10").addEventListener("click", function () {
      seekBy(-SKIP_10_SECONDS);
    });

    document.getElementById("skipForward10").addEventListener("click", function () {
      seekBy(SKIP_10_SECONDS);
    });

    document.getElementById("invertToggle").addEventListener("click", toggleInvert);

    document.getElementById("copyBookmarklet").addEventListener("click", copyBookmarklet);

    updateMuteButton();
    updateSpeedButton();
    updateInvertButton();

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  </script>
</body>
</html>
