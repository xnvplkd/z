<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube 2x Player</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #fff;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 16px;
      font-weight: 700;
    }

    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .message {
      margin-top: 16px;
      line-height: 1.7;
      color: #ddd;
      word-break: break-all;
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #fff;
      color: #111;
      font-weight: 700;
    }

    code {
      background: #222;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>
    <h1>YouTube 2x Player</h1>

    <div class="player-wrap">
      <div id="player"></div>
    </div>

    <div class="controls">
      <button type="button" id="speed2">2倍にする</button>
    </div>

    <div class="message" id="message"></div>
  </main>

  <script>
    const DEFAULT_RATE = 2;
    let player = null;

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function extractYouTubeVideoId(input) {
      if (!input) return null;

      const value = input.trim();

      // 動画IDだけ渡された場合にも対応
      if (/^[a-zA-Z0-9_-]{11}$/.test(value)) {
        return value;
      }

      try {
        const url = new URL(value);

        // https://www.youtube.com/watch?v=VIDEO_ID
        const v = url.searchParams.get("v");
        if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) {
          return v;
        }

        const host = url.hostname.replace(/^www\./, "");

        // https://youtu.be/VIDEO_ID
        if (host === "youtu.be") {
          const id = url.pathname.split("/").filter(Boolean)[0];
          if (id && /^[a-zA-Z0-9_-]{11}$/.test(id)) {
            return id;
          }
        }

        // https://www.youtube.com/embed/VIDEO_ID
        // https://www.youtube.com/shorts/VIDEO_ID
        // https://www.youtube.com/live/VIDEO_ID
        const parts = url.pathname.split("/").filter(Boolean);
        const markers = ["embed", "shorts", "live"];

        for (const marker of markers) {
          const index = parts.indexOf(marker);
          const id = parts[index + 1];

          if (index !== -1 && id && /^[a-zA-Z0-9_-]{11}$/.test(id)) {
            return id;
          }
        }
      } catch (error) {
        return null;
      }

      return null;
    }

    function setMessage(text) {
      document.getElementById("message").innerHTML = text;
    }

    function setPlaybackRate2x() {
      if (!player || typeof player.setPlaybackRate !== "function") return;

      const availableRates = player.getAvailablePlaybackRates
        ? player.getAvailablePlaybackRates()
        : [];

      if (availableRates.length > 0 && !availableRates.includes(DEFAULT_RATE)) {
        setMessage("この動画では2倍速が利用できない可能性があります");
        return;
      }

      player.setPlaybackRate(DEFAULT_RATE);
      setMessage("再生速度を <code>2倍</code> に設定しました");
    }

    function onYouTubeIframeAPIReady() {
      const rawUrl = getParam("url");
      const rawId = getParam("v");
      const videoId = extractYouTubeVideoId(rawUrl || rawId);

      if (!videoId) {
        setMessage(
          "URLパラメータにYouTube動画URLを指定してください<br>" +
          "例: <code>?url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DVIDEO_ID</code><br>" +
          "または <code>?v=VIDEO_ID</code>"
        );
        return;
      }

      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: videoId,
        playerVars: {
          playsinline: 1,
          rel: 0
        },
        events: {
          onReady: function () {
            setPlaybackRate2x();
          },
          onStateChange: function (event) {
            if (event.data === YT.PlayerState.PLAYING) {
              setPlaybackRate2x();
            }
          },
          onPlaybackRateChange: function (event) {
            if (event.data !== DEFAULT_RATE) {
              setPlaybackRate2x();
            }
          }
        }
      });
    }

    document.getElementById("speed2").addEventListener("click", setPlaybackRate2x);

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  </script>
</body>
</html>
