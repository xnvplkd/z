<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YouTube Player</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #fff;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 16px;
      font-weight: 700;
    }

    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .message {
      margin-top: 16px;
      line-height: 1.7;
      color: #ddd;
      word-break: break-all;
    }

    .controls {
      margin-top: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: #fff;
      color: #111;
      font-weight: 700;
    }

    code {
      background: #222;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main>

    <div class="player-wrap">
      <div id="player"></div>
    </div>

    <div class="controls">
      <button type="button" id="speedToggle">x2.0</button>
      <button type="button" id="skipBack10">&lt;&lt;10</button>
      <button type="button" id="skipForward10">&gt;&gt;10</button>
    </div>

    <div class="message" id="message"></div>
  </main>

  <script>
    const NORMAL_RATE = 1;
    const FAST_RATE = 2;
    const INITIAL_SKIP_SECONDS = 90;
    const SKIP_SECONDS = 10;

    let player = null;
    let currentRate = NORMAL_RATE;

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function extractYouTubeVideoId(input) {
      if (!input) return null;

      const value = input.trim();

      // 動画IDだけ渡された場合にも対応
      if (/^[a-zA-Z0-9_-]{11}$/.test(value)) {
        return value;
      }

      try {
        const url = new URL(value);

        // https://www.youtube.com/watch?v=VIDEO_ID
        const v = url.searchParams.get("v");
        if (v && /^[a-zA-Z0-9_-]{11}$/.test(v)) {
          return v;
        }

        const host = url.hostname.replace(/^www\./, "");

        // https://youtu.be/VIDEO_ID
        if (host === "youtu.be") {
          const id = url.pathname.split("/").filter(Boolean)[0];
          if (id && /^[a-zA-Z0-9_-]{11}$/.test(id)) {
            return id;
          }
        }

        // https://www.youtube.com/embed/VIDEO_ID
        // https://www.youtube.com/shorts/VIDEO_ID
        // https://www.youtube.com/live/VIDEO_ID
        const parts = url.pathname.split("/").filter(Boolean);
        const markers = ["embed", "shorts", "live"];

        for (const marker of markers) {
          const index = parts.indexOf(marker);
          const id = parts[index + 1];

          if (index !== -1 && id && /^[a-zA-Z0-9_-]{11}$/.test(id)) {
            return id;
          }
        }
      } catch (error) {
        return null;
      }

      return null;
    }

    function setMessage(text) {
      document.getElementById("message").innerHTML = text;
    }

    function isPlayerReady() {
      return player && typeof player.getCurrentTime === "function";
    }

    function updateSpeedButton() {
      const button = document.getElementById("speedToggle");
      button.textContent = currentRate === FAST_RATE ? "x1.0" : "x2.0";
    }

    function setPlaybackRate(rate) {
      if (!player || typeof player.setPlaybackRate !== "function") return;

      const availableRates = player.getAvailablePlaybackRates
        ? player.getAvailablePlaybackRates()
        : [];

      if (availableRates.length > 0 && !availableRates.includes(rate)) {
        setMessage("この動画では指定した再生速度が利用できない可能性があります");
        return;
      }

      player.setPlaybackRate(rate);
      currentRate = rate;
      updateSpeedButton();

      setMessage("再生速度を <code>" + rate + "倍</code> に設定しました");
    }

    function seekBy(seconds) {
      if (!isPlayerReady()) return;

      const currentTime = player.getCurrentTime();
      const duration = player.getDuration ? player.getDuration() : 0;

      let nextTime = currentTime + seconds;

      if (nextTime < 0) {
        nextTime = 0;
      }

      if (duration && nextTime > duration) {
        nextTime = duration;
      }

      player.seekTo(nextTime, true);
    }

    function toggleSpeedAndPlay() {
      if (!isPlayerReady()) return;

      if (currentRate === FAST_RATE) {
        setPlaybackRate(NORMAL_RATE);
        return;
      }

      player.playVideo();
      seekBy(INITIAL_SKIP_SECONDS);
      setPlaybackRate(FAST_RATE);
    }

    function onYouTubeIframeAPIReady() {
      const rawUrl = getParam("url");
      const rawId = getParam("v");
      const videoId = extractYouTubeVideoId(rawUrl || rawId);

      if (!videoId) {
        setMessage(
          "URLパラメータにYouTube動画URLを指定してください<br>" +
          "例: <code>?url=https%3A%2F%2Fwww.youtube.com%2Fwatch%3Fv%3DVIDEO_ID</code><br>" +
          "または <code>?v=VIDEO_ID</code>"
        );
        return;
      }

      player = new YT.Player("player", {
        width: "100%",
        height: "100%",
        videoId: videoId,
        playerVars: {
          playsinline: 1,
          rel: 0
        },
        events: {
          onReady: function () {
            setPlaybackRate(NORMAL_RATE);
            setMessage("プレイヤーの準備ができました");
          },
          onPlaybackRateChange: function (event) {
            currentRate = event.data;
            updateSpeedButton();
          }
        }
      });
    }

    document.getElementById("speedToggle").addEventListener("click", toggleSpeedAndPlay);

    document.getElementById("skipBack10").addEventListener("click", function () {
      seekBy(-SKIP_SECONDS);
    });

    document.getElementById("skipForward10").addEventListener("click", function () {
      seekBy(SKIP_SECONDS);
    });

    const tag = document.createElement("script");
    tag.src = "https://www.youtube.com/iframe_api";
    document.head.appendChild(tag);
  </script>
</body>
</html>
